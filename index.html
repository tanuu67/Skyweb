    <style>
        * { scroll-behavior: smooth; box-sizing: border-box; }
        body {
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; color: white; line-height: 1.6; overflow-x: hidden;
        }

        /* ✨ CUSTOM PREMIUM SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #a855f7, #ec4899); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; }

        h1, h2, h3, .logo, .big-text {
            font-family: 'Outfit', sans-serif; 
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: sticky; top: 0;
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .logo {
            font-size: 26px; font-weight: 900; letter-spacing: 0.5px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text; color: transparent;
        }
        nav a { margin-left: 25px; color: #cbd5e1; text-decoration: none; transition: 0.3s; font-size: 15px; font-weight: 600; }
        nav a:hover { color: #ec4899; text-shadow: 0 0 10px rgba(236, 72, 153, 0.5); }

        /* HERO SECTION WITH ENTRANCE ANIMATION */
        .hero {
            text-align: center; padding: 120px 20px;
            background: radial-gradient(circle at top, #3b0764 0%, #0f172a 70%);
        }
        .hero h1 { font-size: 55px; margin-bottom: 15px; color: #fff; line-height: 1.2; animation: slideUpFade 0.8s ease-out backwards; }
        .hero p { font-size: 20px; color: #94a3b8; margin-bottom: 40px; font-weight: 300; animation: slideUpFade 0.8s ease-out 0.2s backwards; }
        .hero .btn { animation: slideUpFade 0.8s ease-out 0.4s backwards; }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* BUTTONS */
        .btn {
            padding: 14px 35px; border-radius: 50px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white; text-decoration: none; font-weight: 600; font-size: 16px;
            display: inline-block; transition: all 0.3s ease; border: none; cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            position: relative; overflow: hidden;
        }
        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.5); }

        /* SECTIONS */
        .section { padding: 80px 8%; text-align: center; }
        .big-text {
            font-size: 36px; font-weight: 700; margin-bottom: 20px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text; color: transparent;
        }
