<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWeb Solutions | Global Digital Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { scroll-behavior: smooth; box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: #0f172a; color: white; line-height: 1.6; overflow-x: hidden;
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: sticky; top: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text; color: transparent;
        }
        nav a { margin-left: 20px; color: #cbd5e1; text-decoration: none; transition: 0.3s; font-size: 14px; }
        nav a:hover { color: #ec4899; }

        /* HERO SECTION */
        .hero {
            text-align: center; padding: 100px 20px;
            background: radial-gradient(circle at top, #3b0764, #0f172a);
        }
        .hero h1 { font-size: 45px; margin-bottom: 10px; color: #fff; }
        .hero p { font-size: 18px; color: #94a3b8; margin-bottom: 30px; }

        /* BUTTONS */
        .btn {
            padding: 12px 30px; border-radius: 50px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white; text-decoration: none; font-weight: 600;
            display: inline-block; transition: 0.3s; border: none; cursor: pointer;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3); }

        /* SECTIONS */
        .section { padding: 60px 8%; text-align: center; }
        .big-text {
            font-size: 32px; font-weight: 700; margin-bottom: 20px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text; color: transparent;
        }

        /* SERVICES GRID */
        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-top: 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px; border-radius: 20px; transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: #a855f7; background: rgba(255,255,255,0.06); }
        .card i { font-size: 35px; color: #a855f7; margin-bottom: 15px; }

        /* CONTACT FORM */
        .contact-box {
            max-width: 450px; margin: 0 auto; background: #1e293b;
            padding: 35px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            border: 1px solid #334155; background: #0f172a; color: white;
        }

        /* FLOATING CHAT & WA */
        .whatsapp {
            position: fixed; bottom: 25px; right: 25px; background: #25D366;
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 28px; color: white;
            text-decoration: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .bot-trigger {
            position: fixed; bottom: 25px; left: 25px; background: #a855f7;
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 25px; color: white;
            cursor: pointer; z-index: 1000; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        /* CHAT WINDOW */
        #bot-window {
            position: fixed; bottom: 90px; left: 25px; width: 300px;
            background: #1e293b; border-radius: 15px; border: 1px solid #a855f7;
            display: none; flex-direction: column; overflow: hidden; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .chat-header { background: linear-gradient(90deg, #a855f7, #ec4899); padding: 12px; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-body { height: 280px; padding: 15px; overflow-y: auto; font-size: 13px; background: #0f172a; display: flex; flex-direction: column; gap: 10px; }
        .bot-msg { background: #334155; padding: 10px; border-radius: 12px 12px 12px 0; align-self: flex-start; max-width: 85%; }
        .option-btn { width: 100%; background: transparent; color: #cbd5e1; border: 1px solid #a855f7; padding: 8px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; }
        .option-btn:hover { background: rgba(168, 85, 247, 0.2); color: white; }
